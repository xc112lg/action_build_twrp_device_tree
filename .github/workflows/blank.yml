name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:
        description: 'IMG_URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget aria2 zip git
        python3 -m pip install --upgrade pip
        python3 -m pip install twrpdtgen==2.0.0

    - name: Patch twrpdtgen (fix missing prop)
      run: |
        FILE=$(python3 -c "import twrpdtgen; print(twrpdtgen.__file__)")
        sed -i 's/raise AssertionError.*/return "28"/g' $FILE

    - name: Download image
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        ls -lah

    - name: Generate device tree
      run: |
        mkdir dt
        IMG=$(ls *.img | head -n 1)
        python3 -m twrpdtgen -o dt/ "$IMG"
        ls -R dt

    # 🔥 RELIABLE DETECTION (NO BROKEN GREP)
    - name: Detect device info
      id: device
      run: |
        # Get path like dt/samsung/a5ltechn
        DEVICE_PATH=$(find dt -mindepth 2 -maxdepth 2 -type d | head -n 1)

        BRAND=$(basename $(dirname "$DEVICE_PATH"))
        DEVICE=$(basename "$DEVICE_PATH")

        # fallback safety
        BRAND=${BRAND:-generic}
        DEVICE=${DEVICE:-unknown}

        echo "Detected BRAND=$BRAND"
        echo "Detected DEVICE=$DEVICE"

        echo "brand=$BRAND" >> $GITHUB_OUTPUT
        echo "device=$DEVICE" >> $GITHUB_OUTPUT

    - name: Create repository
      run: |
        REPO_NAME="android_device_${{ steps.device.outputs.brand }}_${{ steps.device.outputs.device }}"
        REPO_NAME=$(echo "$REPO_NAME" | tr -cd '[:alnum:]_')

        echo "Creating repo: $REPO_NAME"

        curl -X POST https://api.github.com/user/repos \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -d "{\"name\":\"$REPO_NAME\",\"private\":false}"

        echo "repo=$REPO_NAME" >> $GITHUB_ENV

    - name: Push device tree
      run: |
        cd dt/${{ steps.device.outputs.brand }}/${{ steps.device.outputs.device }}

        git init
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .
        git commit -m "Initial TWRP device tree"

        git branch -M main

        git remote add origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/${{ env.repo }}.git
        git push origin main
