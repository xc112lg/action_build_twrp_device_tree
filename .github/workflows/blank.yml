name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:
        description: 'IMG_URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget aria2 zip git
        python3 -m pip install --upgrade pip
        python3 -m pip install twrpdtgen==2.0.0

    - name: Download image
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        ls -lah

    - name: Generate device tree
      run: |
        mkdir dt
        IMG=$(ls *.img | head -n 1)
        python3 -m twrpdtgen -o dt/ "$IMG"
        ls -R dt

    - name: Detect device info
      id: device
      run: |
        DEVICE_PATH=$(find dt -mindepth 2 -maxdepth 2 -type d | head -n 1)

        BRAND=$(basename $(dirname "$DEVICE_PATH"))
        DEVICE=$(basename "$DEVICE_PATH")

        BRAND=${BRAND:-generic}
        DEVICE=${DEVICE:-unknown}

        echo "Detected BRAND=$BRAND"
        echo "Detected DEVICE=$DEVICE"

        echo "brand=$BRAND" >> $GITHUB_OUTPUT
        echo "device=$DEVICE" >> $GITHUB_OUTPUT

    - name: Prepare repo name
      run: |
        REPO_NAME="android_device_${{ steps.device.outputs.brand }}_${{ steps.device.outputs.device }}"
        REPO_NAME=$(echo "$REPO_NAME" | tr -cd '[:alnum:]_')
        echo "repo=$REPO_NAME" >> $GITHUB_ENV
        echo "Using repo: $REPO_NAME"

    - name: Create repository if not exists
      run: |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token ${{ secrets.GH_PAT }}" \
          https://api.github.com/repos/${{ github.repository_owner }}/${{ env.repo }})

        if [ "$STATUS" = "200" ]; then
          echo "Repo already exists"
        else
          echo "Creating repository..."
          curl -X POST https://api.github.com/user/repos \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -d "{\"name\":\"${{ env.repo }}\",\"private\":false}"
        fi

    - name: Push device tree (overwrite repo)
      run: |
        REPO_URL="https://${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/${{ env.repo }}.git"

        git clone $REPO_URL repo || (
          echo "Repo does not exist, initializing new one"
          mkdir repo && cd repo && git init
          git remote add origin $REPO_URL
        )

        cd repo

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        # 🔥 Remove all existing files (including hidden ones)
        rm -rf ./* ./.??* || true

        # Copy new generated device tree
        cp -r ../dt/${{ steps.device.outputs.brand }}/${{ steps.device.outputs.device }}/* .

        git add .
        git commit -m "Overwrite with new TWRP device tree" || echo "Nothing to commit"

        git branch -M main
        git push origin main --force
